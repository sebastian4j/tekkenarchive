<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tekken Character Relationships</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./characters.js"></script>
    <script src="./relations.js"></script>
    <script src="./games.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #cy {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(30, 41, 59, 0.9);
            padding: 1.25rem;
            border-radius: 12px;
            border: 1px solid #334155;
            backdrop-filter: blur(8px);
            max-width: 320px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
        }

        .legend-color {
            width: 20px;
            height: 3px;
            margin-right: 10px;
            border-radius: 2px;
        }

        #legend-content {
            transition: max-height 0.3s ease-out;
            overflow: hidden;
        }

        .collapsed #legend-content {
            max-height: 0;
        }

        .rotate-icon {
            transition: transform 0.3s ease;
        }

        .collapsed .rotate-icon {
            transform: rotate(-90deg);
        }
    </style>
</head>

<body>

    <div class="controls" id="main-controls">
        <h1 class="text-xl font-bold mb-1 text-white">Tekken Character Network</h1>

        <!-- Game Selector -->
        <div class="mb-4">
            <label class="text-[10px] uppercase text-slate-500 font-bold block mb-1">Filter by Game</label>
            <select id="game-filter"
                class="w-full bg-slate-800 text-sm border border-slate-600 rounded p-1.5 focus:outline-none focus:border-blue-500 mb-2">
                <!-- Options injected by JS -->
            </select>

            <!-- Reorder Button -->
            <button id="reorder-btn"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold py-2 rounded transition-colors uppercase">
                Rearrange Graph
            </button>
        </div>

        <!-- Character Info -->
        <div id="info" class="text-sm p-3 bg-slate-800 rounded-lg border border-blue-500/50 mb-4 hidden">
            <strong id="char-name" class="text-blue-400 text-base"></strong>
            <div class="mt-1 text-xs text-slate-400">
                <p><strong>Nacionalidad:</strong> <span id="char-nat"></span></p>
                <p><strong>Estilo:</strong> <span id="char-style"></span></p>
            </div>
        </div>

        <!-- Legend
        <div class="border-t border-slate-700 pt-3">
            <button onclick="toggleLegend()"
                class="w-full flex justify-between items-center text-xs font-semibold uppercase text-slate-500 mb-2 focus:outline-none">
                <span>Leyenda de Vínculos</span>
                <span class="rotate-icon">▼</span>
            </button>
            <div id="legend-content">
                <div class="legend-item">
                    <div class="legend-color" style="background-color: #3b82f6;"></div>
                    <span>Familia / Sangre</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color"
                        style="background-color: #f43f5e; border-top: 2px dashed #f43f5e; background: transparent;">
                    </div>
                    <span>Pareja / Romance</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: #94a3b8;"></div>
                    <span>Amistad / Alianza</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: #f59e0b;"></div>
                    <span>Rivalidad / Enemigo</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: #eab308; height: 5px; border-radius: 5px;"></div>
                    <span>Mentor / Maestro</span>
                </div>
            </div>
        </div>-->
    </div>

    <div id="cy"></div>

    <script>
        function toggleLegend() {
            document.getElementById('main-controls').classList.toggle('collapsed');
        }

        /**
         * Genera la ruta de la imagen basada en el ID del personaje
         */
        function getCharacterImagePath(characterId) {
            return `img/${characterId}.png`;
        }

        document.addEventListener('DOMContentLoaded', function () {
            
            const gameFilter = document.getElementById('game-filter');
            games.forEach(game => {
                const option = document.createElement('option');
                option.value = game.id;
                option.textContent = game.name;
                gameFilter.appendChild(option);
            });

            // Mapeo a formato Cytoscape con inyección dinámica de la imagen
            const elements = [
                ...characters.map(char => ({
                    data: {
                        ...char,
                        image: getCharacterImagePath(char.id)
                    }
                })),
                ...relations.map((rel, index) => ({
                    data: {
                        id: `rel-${index}`,
                        ...rel
                    }
                }))
            ];

            const cy = cytoscape({
                container: document.getElementById('cy'),
                elements: elements,
                style: [
                    {
                        selector: 'node',
                        style: {
                            'label': 'data(name)',
                            'color': '#fff',
                            'background-color': '#1e293b',
                            'background-image': 'data(image)',
                            'background-fit': 'cover',
                            'text-valign': 'bottom',
                            'text-halign': 'center',
                            'font-size': '12px',
                            'width': '60px',
                            'height': '60px',
                            'border-width': 3,
                            'border-color': '#3b82f6',
                            'text-margin-y': 8
                        }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'width': 2,
                            'curve-style': 'bezier',
                            'label': 'data(label)',
                            'font-size': '9px',
                            'color': '#94a3b8',
                            'text-rotation': 'autorotate',
                            'text-margin-y': -10,
                            'target-arrow-shape': 'triangle',
                            'arrow-scale': 1.2
                        }
                    },
                    { selector: 'edge[type="familia"]', style: { 'line-color': '#3b82f6', 'target-arrow-color': '#3b82f6' } },
                    { selector: 'edge[type="romance"]', style: { 'line-color': '#f43f5e', 'target-arrow-shape': 'none', 'line-style': 'dashed' } },
                    { selector: 'edge[type="amistad"]', style: { 'line-color': '#94a3b8', 'target-arrow-color': '#94a3b8' } },
                    { selector: 'edge[type="rivalidad"]', style: { 'line-color': '#f59e0b', 'target-arrow-color': '#f59e0b', 'width': 3 } },
                    { selector: 'edge[type="maestro"]', style: { 'line-color': '#eab308', 'target-arrow-color': '#eab308', 'width': 3 } },
                    { selector: ':selected', style: { 'border-color': '#fff', 'border-width': 5 } }
                ],
                layout: { name: 'cose', padding: 100, animate: true }
            });

            const runLayout = () => {
                cy.layout({ name: 'cose', animate: true, padding: 100 }).run();
            };

            document.getElementById('reorder-btn').addEventListener('click', runLayout);

            gameFilter.addEventListener('change', function (e) {
                const gameId = e.target.value;
                if (gameId === 'all') {
                    cy.elements().removeClass('hidden');
                } else {
                    cy.elements().addClass('hidden');
                    const filteredNodes = cy.nodes().filter(n => n.data('games').includes(gameId));
                    filteredNodes.removeClass('hidden');
                    filteredNodes.connectedEdges().forEach(edge => {
                        if (!edge.source().hasClass('hidden') && !edge.target().hasClass('hidden')) {
                            edge.removeClass('hidden');
                        }
                    });
                }
                runLayout();
            });

            cy.style().selector('.hidden').style({ 'display': 'none' }).update();

            cy.on('tap', 'node', function (evt) {
                const node = evt.target;
                const infoDiv = document.getElementById('info');
                document.getElementById('char-name').textContent = node.data('name');
                document.getElementById('char-nat').textContent = node.data('nationality');
                document.getElementById('char-style').textContent = node.data('style');
                infoDiv.classList.remove('hidden');
            });

            cy.on('tap', function (evt) {
                if (evt.target === cy) {
                    document.getElementById('info').classList.add('hidden');
                }
            });
        });
    </script>
</body>

</html>
